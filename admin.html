<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 알림톡 발송 내역</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f5f7; padding: 40px; margin: 0; }
        .container { max-width: 1000px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        h2 { display: flex; justify-content: space-between; align-items: center; color: #333; margin-top: 0; }
        button { padding: 8px 16px; background-color: #000; color: white; border: none; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; font-weight: bold; }
        .status-sent { color: #2ecc71; font-weight: bold; }
        .status-pending { color: #f39c12; font-weight: bold; }
        .status-failed { color: #e74c3c; font-weight: bold; }
        .status-skipped { color: #95a5a6; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        알림톡 발송 스케줄 및 이력
        <button onclick="fetchHistory()">새로고침</button>
    </h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>이메일</th>         
                <th>연락처</th>         
                <th>템플릿 코드</th>
                <th>예약 시간</th>
                <th>상태</th>
                <th>시도</th>
                <th>에러 로그</th>      
                <th>발송 시간</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
</div>

<script>
    async function fetchHistory() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">데이터를 불러오는 중...</td></tr>';

        try {
            const response = await fetch('http://localhost:3000/admin/notifications');
            const data = await response.json();

            tbody.innerHTML = '';
            
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">예약된 발송 내역이 없습니다.</td></tr>';
                return;
            }

            data.forEach(row => {
                const tr = document.createElement('tr');
                const scheduledAt = new Date(row.scheduledAt).toLocaleTimeString();
                const sentAt = row.sentAt ? new Date(row.sentAt).toLocaleTimeString() : '-';
                
                // 유저 정보가 없을 경우를 대비해 옵셔널 체이닝(?.) 사용
                const userEmail = row.user ? row.user.email : '탈퇴 유저';
                const userPhone = row.phone || (row.user ? row.user.phone : '-');

                tr.innerHTML = `
                    <td>${row.id}</td>
                    <td>${userEmail}</td>
                    <td>${userPhone}</td> <td>${row.templateCode}</td>
                    <td>${scheduledAt}</td>
                    <td class="status-${row.status}">${row.status.toUpperCase()}</td>
                    <td>${row.attemptCount} / 3</td>
                    <td style="color:#e74c3c; font-size: 12px;">${row.lastError || '-'}</td> <td>${sentAt}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:red;">서버 연결에 실패했습니다.</td></tr>';
        }
    }

    // 페이지 로드 시 자동 실행
    fetchHistory();
</script>

</body>
</html>
