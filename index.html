<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알림톡 연동 테스트</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f5f7; padding: 40px; }
        .container { max-width: 400px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="email"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #000; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #333; }
        .result { margin-top: 20px; font-size: 14px; color: green; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>회원가입 시뮬레이션</h2>
    <div class="form-group">
        <label>이름</label>
        <input type="text" id="name" value="오혜성" placeholder="이름 입력">
    </div>
    <div class="form-group">
        <label>이메일</label>
        <input type="email" id="email" value="test@example.com" placeholder="이메일 입력">
    </div>
    <div class="form-group">
        <label>휴대폰 번호 (하이픈 제외)</label>
        <input type="text" id="phone" value="01012345678" placeholder="01012345678">
    </div>
    <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="marketing" checked>
        <label style="margin: 0;">알림톡/SMS 수신 동의</label>
    </div>
    <button onclick="registerUser()">가입하고 카톡 알림 받기</button>
    <div id="resultMsg" class="result"></div>
</div>
<hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
    <div class="form-group">
        <label>탈퇴할 이메일</label>
        <div style="display: flex; gap: 10px;">
            <input type="email" id="withdrawEmail" placeholder="가입한 이메일 입력" style="flex: 1;">
            <button onclick="withdrawUser()" style="width: auto; background-color: #e74c3c; margin-top: 0;">회원 탈퇴</button>
        </div>
    </div>

<script>
    async function registerUser() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const agreeMarketingReceiveSms = document.getElementById('marketing').checked;

        try {
            // 본인의 NestJS 서버 주소와 포트 확인 필수 (예: 3000)
            const response = await fetch('http://localhost:3000/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, phone, agreeMarketingReceiveSms })
            });

            if (response.ok) {
                document.getElementById('resultMsg').style.color = "green";
                document.getElementById('resultMsg').innerText = "가입 완료! (본인 카톡을 확인해보세요)";
                // 설문창이 있다면 노출
                if(document.getElementById('surveyBox')) {
                    document.getElementById('surveyBox').style.display = "block";
                }
            } else {
                // 👇👇 이 부분을 수정합니다 👇👇
                const errorData = await response.text(); // 서버가 보낸 에러 상세 내용 읽기
                document.getElementById('resultMsg').style.color = "red";
                document.getElementById('resultMsg').innerText = `서버 거절 (상태코드: ${response.status}) \n이유: ${errorData}`;
                console.error("상세 에러:", errorData);
            }
        } catch (error) {
            alert('서버와 연결할 수 없습니다. NestJS 서버가 켜져 있는지 확인해주세요.');
        }
    }

    async function withdrawUser() {
        const email = document.getElementById('withdrawEmail').value;
        if(!email) return alert('탈퇴할 이메일을 입력해주세요.');

        try {
            const response = await fetch(`http://localhost:3000/auth/withdraw/${email}`, {
                method: 'DELETE'
            });
            if(response.ok) {
                alert('탈퇴 처리가 완료되었습니다. (스케줄러가 발송 직전 이 상태를 감지하고 알림톡을 스킵합니다!)');
            } else {
                alert('탈퇴 처리 실패');
            }
        } catch(error) {
            alert('서버 오류');
        }
    }    
</script>

</body>
</html>
